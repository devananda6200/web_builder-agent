<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Builder Interface</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: rgba(30, 41, 59, 0.7);
            --text-color: #f8fafc;
            --accent-primary: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.5);
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 50% 0%, #1e293b 0%, var(--bg-color) 70%);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
            margin-top: 4rem;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .header {
            text-align: center;
            animation: fadeIn 1s ease-out;
        }

        .header h1 {
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .header p {
            color: #94a3b8;
            font-size: 1.1rem;
        }

        .input-group {
            display: flex;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 99px;
            padding: 0.5rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .input-group:focus-within {
            box-shadow: 0 0 0 2px var(--accent-primary), 0 0 20px var(--accent-glow);
            border-color: var(--accent-primary);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-color);
            padding: 1rem 1.5rem;
            font-size: 1.1rem;
            outline: none;
            font-family: 'Inter', sans-serif;
        }

        button {
            background: linear-gradient(135deg, #3b82f6, #6366f1);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 99px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px var(--accent-glow);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            background: #475569;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        /* ── Progress Bar ───────────────────────────────── */
        .progress-bar-container {
            display: none;
            background: rgba(255,255,255,0.05);
            border-radius: 99px;
            height: 8px;
            overflow: hidden;
            position: relative;
        }
        .progress-bar-container.visible { display: block; }
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6, #10b981);
            border-radius: 99px;
            width: 0%;
            transition: width 0.6s ease;
        }
        .progress-label {
            text-align: right;
            font-size: 0.8rem;
            color: #94a3b8;
            margin-top: 0.4rem;
            display: none;
        }
        .progress-label.visible { display: block; }

        /* ── Logs Panel ─────────────────────────────────── */
        .logs-panel {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 2rem;
            min-height: 400px;
            max-height: 500px;
            overflow-y: auto;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            gap: 1rem;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .logs-panel.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .log-entry {
            padding: 1rem;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.03);
            border-left: 4px solid var(--accent-primary);
            animation: slideIn 0.3s ease;
        }

        .log-entry.planner  { border-left-color: #8b5cf6; }
        .log-entry.architect { border-left-color: #06b6d4; }
        .log-entry.coder    { border-left-color: #3b82f6; }
        .log-entry.END      { border-left-color: var(--success); background: rgba(16,185,129,0.06); }
        .log-entry.ERROR    { border-left-color: var(--error); background: rgba(239,68,68,0.06); }

        .log-header {
            font-weight: 600;
            font-size: 0.9rem;
            color: #94a3b8;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .log-header .icon {
            font-size: 1rem;
        }

        .log-content {
            font-family: 'Inter', monospace;
            font-size: 0.92rem;
            white-space: pre-wrap;
            color: #e2e8f0;
            line-height: 1.5;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            display: none;
            vertical-align: middle;
            margin-left: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.3); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Agent Hosting Interface</h1>
            <p>Deploy and interact with your powerful code builder</p>
        </div>

        <div class="input-group">
            <input type="text" id="promptInput" placeholder="Describe the project you want to build..." autocomplete="off">
            <button id="generateBtn">
                Generate <div class="spinner" id="btnSpinner"></div>
            </button>
        </div>

        <div class="progress-bar-container" id="progressBar">
            <div class="progress-bar-fill" id="progressFill"></div>
        </div>
        <div class="progress-label" id="progressLabel"></div>

        <div class="logs-panel" id="logsPanel">
            <!-- Logs will be populated here -->
        </div>
    </div>

    <script>
        const input = document.getElementById('promptInput');
        const btn = document.getElementById('generateBtn');
        const spinner = document.getElementById('btnSpinner');
        const logsPanel = document.getElementById('logsPanel');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const progressLabel = document.getElementById('progressLabel');

        const NODE_ICONS = {
            planner: '🗺️',
            architect: '📐',
            coder: '💻',
            END: '✅',
            ERROR: '❌',
            System: '⚙️',
        };

        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') startGeneration();
        });
        btn.addEventListener('click', startGeneration);

        function createLogEntry(title, content, typeClass = '') {
            const icon = NODE_ICONS[title] || NODE_ICONS[typeClass] || '📋';
            const el = document.createElement('div');
            el.className = `log-entry ${typeClass}`;
            el.innerHTML = `
                <div class="log-header"><span class="icon">${icon}</span> ${title}</div>
                <div class="log-content">${content}</div>
            `;
            logsPanel.appendChild(el);
            logsPanel.scrollTop = logsPanel.scrollHeight;
        }

        function updateProgress(current, total) {
            progressBar.classList.add('visible');
            progressLabel.classList.add('visible');
            const pct = Math.round((current / total) * 100);
            progressFill.style.width = pct + '%';
            progressLabel.textContent = `Step ${current} / ${total}  (${pct}%)`;
        }

        function startGeneration() {
            const prompt = input.value.trim();
            if (!prompt) return;

            // UI reset
            btn.disabled = true;
            spinner.style.display = 'inline-block';
            logsPanel.classList.add('visible');
            logsPanel.innerHTML = '';
            progressFill.style.width = '0%';
            progressBar.classList.remove('visible');
            progressLabel.classList.remove('visible');

            createLogEntry('System', 'Starting agent workflow…', 'SYSTEM');

            const url = `/api/chat?prompt=${encodeURIComponent(prompt)}`;
            const eventSource = new EventSource(url);

            eventSource.onmessage = (event) => {
                const data = JSON.parse(event.data);

                if (data.node === 'END') {
                    progressFill.style.width = '100%';
                    createLogEntry('Finished', 'Agent has completed all tasks successfully! 🎉', 'END');
                    finishUI(eventSource);
                } else if (data.node === 'ERROR') {
                    createLogEntry('Error', data.error, 'ERROR');
                    finishUI(eventSource);
                } else {
                    let content = `Agent node "${data.node}" is active.`;

                    if (data.plan) {
                        const p = data.plan;
                        content = `Project: ${p.name}\nStack: ${p.techstack}\nFeatures: ${p.features?.join(', ')}\nFiles: ${p.files?.map(f => f.path).join(', ')}`;
                    }

                    if (data.current_task) {
                        content += `\n\n📝 Task: ${data.current_task}`;
                    }
                    if (data.current_file) {
                        content += `\n📄 File: ${data.current_file}`;
                    }
                    if (data.progress) {
                        const [cur, tot] = data.progress.split('/').map(Number);
                        updateProgress(cur, tot);
                    }

                    createLogEntry(data.node, content, data.node);
                }
            };

            eventSource.onerror = () => {
                createLogEntry('System', 'Connection lost or stream interrupted.', 'ERROR');
                finishUI(eventSource);
            };
        }

        function finishUI(es) {
            es.close();
            btn.disabled = false;
            spinner.style.display = 'none';
        }
    </script>
</body>
</html>
